name: CI

on:
    push:
      branches: [main]
    pull_request:
      branches: [main]

jobs:
    ci:
      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: "pnpm"

        - run: pnpm install

        - run: npx tsc --noEmit

        - run: pnpm test -- --ci --passWithNoTests